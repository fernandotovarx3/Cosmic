version: '3'
services:
  maplestory:
    container_name: cosmic-maplestory-1
    restart: unless-stopped
    build: .
    depends_on:
      - db
    ports:
      - "8484:8484"
      - "7575-7594:7575-7594"
    volumes:
      - ./config.yaml:/opt/server/config.yaml
      - ./scripts:/opt/server/scripts
      - ./wz:/opt/server/wz
    environment:
      DB_HOST: "db"
      JAVA_TOOL_OPTIONS: "-Xmx2048m -Xms1024m"
    deploy:
      resources:
        limits:
          memory: 2400M
        reservations:
          memory: 1024M
  db:
    container_name: cosmic-db-1
    restart: unless-stopped
    image: mysql:8.4.0
    stop_grace_period: 30s
    command: --mysql-native-password=ON
    environment:
      MYSQL_DATABASE: "cosmic"
      MYSQL_ROOT_PASSWORD: "Tobedog12.12."
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - ./database/docker-db-data:/var/lib/mysql
